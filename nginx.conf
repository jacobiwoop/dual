server {
    listen 80;
    server_name localhost;

    # Configuration pour le projet "basic" (racine)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Support du routing côté client (React Router, etc.)
        try_files $uri $uri/ /index.html;
    }

    # Configuration pour le projet "creator" (/creator)
    location /creator {
        alias /usr/share/nginx/html/creator;
        index index.html index.htm;
        # Support du routing côté client pour l'app sous /creator
        try_files $uri $uri/ /creator/index.html;
    }

    # Optionnel : Gestion des erreurs 404 (on peut renvoyer sur index.html par défaut)
    error_page 404 /index.html;
}
