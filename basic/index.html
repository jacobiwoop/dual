  <body>
    <div id="root"></div>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error happens when a polyfill tries to overwrite window.fetch in an environment where it's read-only.
      try {
        if (window.fetch) {
          Object.defineProperty(window, "fetch", {
            writable: true,
            value: window.fetch,
          });
        }
      } catch (e) {
        console.warn("Failed to make window.fetch writable:", e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
