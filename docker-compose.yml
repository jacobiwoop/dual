services:
  redis:
    image: redis:7-alpine
    container_name: basic-instinct-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - basic-instinct-network

volumes:
  redis_data:
    driver: local

networks:
  basic-instinct-network:
    driver: bridge
